                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start(0);
                console.log(`津波専用URL音源 (${urlKey}) を再生しました。`);
                return; // 専用音源を再生したらここで終了
            }

            // 2. 専用URL音源がない場合、フォールバックとして<select>で設定された音を再生
            const fallbackAlarmType = CURRENT_SETTINGS.tsunamiSoundMap[tsunamiType] || 'silent';

            if (fallbackAlarmType === 'silent') {
                console.log(`津波アラーム (${tsunamiType}) は設定によりミュートされています。`);
                return;
            }
            
            console.log(`津波専用URL音源(${urlKey})が見つからないため、フォールバック音源(${fallbackAlarmType})を再生します。`);
            
            // フォールバック音源がカスタムURL音源(A/B)の場合も考慮
            if (fallbackAlarmType.startsWith('custom_url_')) {
                playCustomUrlSound(fallbackAlarmType);
            } else {
                playSynthesizedAlarm(fallbackAlarmType);
            }
        }

        /**
         * シンセサイザー音（EEW標準、サイレン、カスタムトーン）を再生する
         * @param {string} alarmType - 再生するアラームの種類
         */
        function playSynthesizedAlarm(alarmType) {
            
            // ----------------------------------------------------
            // 🔊 URL音源の再生ロジック (汎用カスタムURL A/B) 🔊
            // ----------------------------------------------------
            if (alarmType.startsWith('custom_url_')) {
                playCustomUrlSound(alarmType);
                return; // URL音源の再生が試行されたらここで終了
            }
            
            // ----------------------------------------------------
            // 🎵 シンセサイザー音の再生ロジック 🎶
            // ----------------------------------------------------
            playSynth(alarmType);
        }

        /**
         * シンセサイザー音を再生する内部関数
         */
        function playSynth(alarmType) {
            
            if (!audioContext) { return; }
            
            let sequence = [];
            let repeat = 0;
            const masterGainVolume = 0.7;

            if (alarmType === 'classic_eew') {
                // EEW標準音 (660Hz/990Hz) - ピョロピョロ
                sequence = [
                    { freq: 660, duration: 0.15 }, 
                    { freq: 990, duration: 0.15 }, 
                    { freq: 0, duration: 0.05 },
                ];
                repeat = 4;
            } else if (alarmType === 'urgent_siren') {
                // 緊迫サイレン音 (1000Hz/800Hz)
                sequence = [
                    { freq: 1000, duration: 0.1 }, 
                    { freq: 800, duration: 0.1 }, 
                    { freq: 0, duration: 0.05 },
                ];
                repeat = 8;
            } else if (alarmType === 'simple_beep') {
                // ピーン音 (660Hz)
                sequence = [
                    { freq: 660, duration: 0.1 }, 
                    { freq: 0, duration: 0.2 },
                ];
                repeat = 3; 
            } else if (alarmType === 'custom_tone_a' || alarmType === 'custom_tone_b') {
                // 🎵 カスタムトーンのロジック 🎶
                const customA = CURRENT_SETTINGS.customTones.custom_a;
                const customB = CURRENT_SETTINGS.customTones.custom_b;
                
                // カスタム音のシーケンス定義: [ベース周波数, ベース + 変調, 休憩] を繰り返す
                const tempoSeconds = customB.tempoMs / 1000;

                sequence = [
                    { freq: customA.baseFreq, duration: tempoSeconds }, 
                    { freq: customA.baseFreq + customA.modFreq, duration: tempoSeconds }, 
                    { freq: 0, duration: 0.05 },
                ];
                repeat = customB.repeats;
                console.log(`カスタムトーン (${alarmType}) を再生: Base=${customA.baseFreq}Hz, Mod=${customA.modFreq}Hz, Tempo=${customB.tempoMs}ms, Repeat=${customB.repeats}`);
            } else {
                return; // 未定義のアラームタイプ
            }
            
            const totalDuration = sequence.reduce((sum, s) => sum + s.duration, 0) * repeat;

            const masterGain = audioContext.createGain();
            masterGain.gain.setValueAtTime(masterGainVolume, audioContext.currentTime); 
            masterGain.connect(audioContext.destination);

            let startTime = audioContext.currentTime;

            for (let r = 0; r < repeat; r++) {
                sequence.forEach(tone => {
                    if (tone.freq > 0) {
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(tone.freq, startTime);
                        
                        // フェードイン/アウト処理
                        gainNode.gain.setValueAtTime(0.0001, startTime);
                        gainNode.gain.linearRampToValueAtTime(1.0, startTime + 0.01);
                        gainNode.gain.linearRampToValueAtTime(0.0001, startTime + tone.duration - 0.01);

                        oscillator.connect(gainNode);
                        gainNode.connect(masterGain);

                        oscillator.start(startTime);
                        oscillator.stop(startTime + tone.duration);
                    }
                    
                    startTime += tone.duration;
                });
            }

            console.log(`シンセサイザーアラーム音を再生しました (${alarmType}、合計 ${totalDuration.toFixed(2)} 秒)。`);
        }

        /**
         * 汎用のカスタムURL音源 (A/B) を再生する
         */
        function playCustomUrlSound(alarmType) {
            const buffer = audioBuffers[alarmType];
            if (buffer) {
                const source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start(0);
                console.log(`URL音源 (${alarmType}) を再生しました。`);
            } else {
                console.error(`${alarmType}: 音声バッファがロードされていないか、ロードに失敗しています。デフォルトのEEW音を再生します。`);
                // ロード失敗時はフォールバックとしてEEW標準音を再生
                playSynth('classic_eew'); 
            }
        }

        // ----------------------------------------------------
        // 🚨 メインロジック (EEW処理、続報、タイマー) 🚨
        // ----------------------------------------------------
        const WS_URL = 'wss://api.p2pquake.net/v2/ws';
        const P2P_TYPES = [551, 552, 556]; // EEW, 地震情報, 津波予報

        let ws;
        let reconnectInterval = 5000; 
        
        /** EEWアラート要素のコンテンツを更新する (551 続報用) */
        function updateAlertElementContent(element, data) {

        /** データ構造からEEW, 地震情報, 津波情報のいずれかを判定する */
        function getDataType(data) {
            if (data.earthquake && data.earthquake.hypocenter && data.issue?.serial) {
                return 'EEW'; // シリアル番号付きの地震情報 -> EEW
            } else if (data.earthquake && data.earthquake.hypocenter) {
                return 'QuakeInfo'; // シリアル番号なしの地震情報 -> 地震情報テロップ
            } else if (data.areas && data.areas.some(a => a.grade)) {
                return 'TsunamiInfo'; // 'grade'を持つareasがある -> 津波情報
            } else if (data.cancelled === true || data.issue?.text?.includes('解除')) {
                return 'TsunamiInfo'; // 解除報
            }
            return 'Unknown';
        }

        /** P2P Quakeから受信したデータのエントリーポイント */
        function processAlertData(data) {
            const dataType = getDataType(data);

            if (dataType === 'Unknown') {
                console.log(`処理対象外のデータを受信しました (code: ${data.code})。スキップします。`, data);
                return;
            }
            
            let epicenterText = data.issue?.text || data.earthquake?.hypocenter?.name || '調査中';
            if (epicenterText === '不明') epicenterText = '調査中';

            let displayTime = data.time || new Date().toISOString();
            let timeLabel = '受信';
            if (data.earthquake?.time) {
                displayTime = data.earthquake.time;
                timeLabel = '発生';
            }

            const historyItem = {
                time: displayTime,
                timeLabel: timeLabel,
                // 修正: issue.textが存在すれば、それを優先的にepicenterとして使用する
                // これにより、取消報などのテキスト情報も履歴に残る
                epicenter: epicenterText,
                maxInt: data.earthquake?.maxScale || 0,
                maxIntText: intensityToJma(data.earthquake?.maxScale || 0),
                displayed: false, // デフォルトは非表示
                type: 'Unknown'
            };

            if (dataType === 'EEW') {
                historyItem.type = 'EEW';
                const serial = data.issue.serial;
                const existingElement = document.querySelector(`[data-eew-serial="${serial}"]`);
                if (existingElement) {
                    // 続報として既存のアラートを更新
                    console.log(`EEW続報を処理します (serial: ${serial})`);
                    historyItem.displayed = true; // 続報は必ず表示される
                    updateAlertElementContent(existingElement, data);
                    // 🚨 修正: 続報受信時にテロップも強制的に更新する
                    console.log('EEW続報により、地震情報テロップを最新情報に更新します。');
                    showQuakeTicker(data);
                } else {
                    // 新規アラートとして作成
                    createAlertElement(data);
                }
            } else if (dataType === 'QuakeInfo') {
                historyItem.type = 'QuakeInfo';
                // 🚨 修正: ここでの直接呼び出しは震度チェックを showQuakeTicker 関数内で行う
                const maxInt = data.earthquake?.maxScale || 0;
                if (maxInt >= CURRENT_SETTINGS.minIntensityScaleTicker) {
                    showQuakeTicker(data);
                    historyItem.displayed = true;
                } else {
                    historyItem.displayed = false;
                    console.log(`地震情報テロップの表示をスキップしました。最大震度 ${intensityToJma(maxInt)} が設定された最低震度 ${intensityToJma(CURRENT_SETTINGS.minIntensityScaleTicker)} 未満です。`);
                }
                
            } else if (dataType === 'TsunamiInfo') {
                historyItem.type = 'TsunamiInfo';
                historyItem.epicenter = data.issue?.text || data.areas?.map(a => a.name).join('、') || '津波情報';
                const text = data.issue?.text || '';
                const isCancelled = text.includes('解除');

                // 修正: areas 配列の grade をチェックする
                const isWarning = data.areas?.some(area => 
                    area.grade === 'MajorWarning' || // 大津波警報
                    area.grade === 'Warning' ||      // 津波警報
                    area.grade === 'Watch'           // 津波注意報
                ) || (
                    // 修正: areasがない場合、issue.textの内容でフォールバック判定
                    !isCancelled && // 解除報は除く
                    (text.includes('大津波警報') || text.includes('津波警報') || text.includes('津波注意報'))
                );

                /**
                 * 🌊 津波テロップ用の詳細メッセージを生成する 🌊
                 * @param {Object} data - P2P 556データ
                 * @returns {string} 生成されたテロップメッセージ
                 */
                function createTsunamiTickerMessage(data) {
                    if (!data.areas || data.areas.length === 0) {
                        return data.issue?.text || '津波に関する情報が発表されました。';
                    }

                    // 警報レベルごとに地域をグループ化
                    const groupedAreas = {
                        MajorWarning: [],
                        Warning: [],
                        Watch: []
                    };
                    data.areas.forEach(area => {
                        if (groupedAreas[area.grade]) {
                            groupedAreas[area.grade].push(area);
                        }
                    });

                    // 最も高い警報レベルを決定
                    const hasMajorWarning = data.areas.some(a => a.grade === 'MajorWarning');
                    const hasWarning = data.areas.some(a => a.grade === 'Warning');

                    let highestGradeText = '津波注意報';
                    let highestCallToAction = '海岸に近づかないでください';
                    let highestGradeAreas = groupedAreas.Watch;

                    if (hasMajorWarning) {
                        highestGradeText = '大津波警報';
                        highestCallToAction = 'ただちに高台へ避難してください';
                        highestGradeAreas = groupedAreas.MajorWarning;
                    } else if (hasWarning) {
                        highestGradeText = '津波警報';
                        highestCallToAction = '海岸から離れてください';
                        highestGradeAreas = groupedAreas.Warning;
                    }

                    // メインメッセージの生成 (最高レベルの警報対象地域)
                    const mainAreasText = highestGradeAreas.map(a => a.name).join(' ');
                    const mainMessage = `【${highestGradeText}】 ${mainAreasText} に ${highestGradeText}が発表されました ${highestCallToAction}`;

                    // 詳細情報の生成 (警報レベルごと)
                    const gradeOrder = ['MajorWarning', 'Warning', 'Watch'];
                    const gradeLabels = { MajorWarning: '大津波警報', Warning: '津波警報', Watch: '津波注意報' };
                    let detailsMessage = '';
                    let hasAnyDetails = false; // 🚨 修正: いずれかの地域に詳細情報があるかを追跡するフラグ

                    gradeOrder.forEach(grade => {
                        if (groupedAreas[grade].length > 0) {
                            const areasDetailsText = groupedAreas[grade].map(area => {
                                let subDetails = [];
                                // 🚨 修正: 詳細情報があればフラグを立てる
                                if (area.firstHeight) {
                                    if (area.firstHeight.time) {
                                        const arrivalTime = new Date(area.firstHeight.time);
                                        subDetails.push(`到達 ${arrivalTime.getHours()}時${arrivalTime.getMinutes()}分`);
                                    } else if (area.firstHeight.condition) {
                                        subDetails.push(area.firstHeight.condition);
                                    }
                                    if (subDetails.length > 0) hasAnyDetails = true;
                                }
                                if (area.maxHeight) {
                                    if (area.maxHeight.value) {
                                        subDetails.push(`予想高さ ${area.maxHeight.value}m`);
                                    } else if (area.maxHeight.condition) {
                                        subDetails.push(`予想高さ ${area.maxHeight.condition}`);
                                    }
                                    if (subDetails.length > 0 && !hasAnyDetails) hasAnyDetails = true;
                                }
                                return `${area.name}${subDetails.length > 0 ? `(${subDetails.join(' ')})` : ''}`;
                            }).join(' ');
                            detailsMessage += ` 【${gradeLabels[grade]}】 ${areasDetailsText}`;
                        }
                    });

                    // 🚨 修正: 詳細情報がある場合のみ「到達予想時間と高さ」セクションを追加
                    if (detailsMessage && hasAnyDetails) {
                        return `${mainMessage}　　到達予想時間と高さ ${detailsMessage}`;
                    }

                    return mainMessage;
                }

                if (isCancelled) {
                    // 解除報を受信したら、表示中のすべての津波アラートを削除
                    document.querySelectorAll('[data-alert-type="tsunami"]').forEach(el => el.remove());
                    hideTsunamiTicker();
                    playAlarmForTsunami('cancelled');
                    console.log('津波警報の解除報を受信したため、関連アラートを非表示にしました。');
                    historyItem.displayed = true; // 解除も重要な情報なので表示扱い
                } else if (isWarning) {
                    // 警報・注意報を受信したら、上部アラートとして表示
                    activeTsunamiInfo = createTsunamiTickerMessage(data); // 新しい関数でメッセージを生成
                    createAlertElement(data);
                    historyItem.displayed = true;
                } else {
                    console.log(`津波情報を受信しましたが、警報・注意報・解除報ではないため表示をスキップしました: ${text}`);
                }
            }

            // 表示判定ロジック (createAlertElement内で行われるため、ここで再判定)
            if (dataType === 'EEW' && historyItem.maxInt) {
                if (historyItem.maxInt >= 45 || historyItem.maxInt >= CURRENT_SETTINGS.minIntensityScale) {
                    historyItem.displayed = true;
                }
            }

            // 履歴を追加
            addHistoryItem(historyItem);

            // 履歴を永続化
            saveHistoryToLocalStorage();
        }

        // ----------------------------------------------------
        // 🌐 WebSocket接続 🌐
        // ----------------------------------------------------
        function connectWebSocket() {
            if (ws) { ws.close(); }

            loadStatusEl.textContent = '接続中...';

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                loadStatusEl.textContent = '接続完了';
                loadStatusEl.classList.remove('bg-yellow-700');
                loadStatusEl.classList.add('bg-teal-700');

                ws.send(JSON.stringify({ "types": P2P_TYPES }));
                setTimeout(() => { loadStatusEl.classList.add('hidden'); }, 5000);
                reconnectInterval = 5000; 
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (P2P_TYPES.includes(data.code)) {
                        console.log('地震情報を受信:', data);
                        processAlertData(data); 
                    }
                } catch (e) {
                    console.error('JSON解析エラー:', e);
                }
            };

            ws.onclose = (event) => {
                loadStatusEl.textContent = '切断。再接続中...';
                loadStatusEl.classList.remove('hidden');
                loadStatusEl.classList.remove('bg-teal-700');
                loadStatusEl.classList.add('bg-yellow-700');

                setTimeout(connectWebSocket, reconnectInterval);
            };

            ws.onerror = (error) => {
                console.error('WebSocketエラー:', error);
                loadStatusEl.textContent = '接続エラー';
                loadStatusEl.classList.remove('hidden');
                loadStatusEl.classList.remove('bg-teal-700');
                loadStatusEl.classList.add('bg-red-700');

                ws.close(); 
            };
        }

        // ----------------------------------------------------
        // 🌟 テスト機能の実装 🌟
        // ----------------------------------------------------
        const TEST_EEW_SERIAL_A = "TEST-EEW-SERIAL-001";
        
        const TEST_DATA = {
            // 🚨 修正: EEWのテストデータを、より現実的な形式に修正
            'eew_5weak_a': {
                "code": 551, "issue": {"source": "試験用A", "time": new Date().toISOString(), "type": "Alert", "serial": TEST_EEW_SERIAL_A},
                "earthquake": {
                    "time": new Date().toISOString(), "hypocenter": {"name": "能登半島沖", "depth": 10},
                    "maxScale": 45, "magnitude": 6.2
                },
                "areas": [
                    { "pref": "石川県", "name": "石川県能登", "scaleFrom": 45, "scaleTo": 45, "kindCode": "10" }
                ],
                "isTest": true
            },
            'eew_6strong_a': {
                "code": 551, "issue": {"source": "試験用A", "time": new Date().toISOString(), "type": "Alert", "serial": TEST_EEW_SERIAL_A},
                "earthquake": {
                    "time": new Date().toISOString(), "hypocenter": {"name": "能登半島沖", "depth": 10},
                    "maxScale": 60, "magnitude": 7.5
                },
                "areas": [
                    { "pref": "石川県", "name": "石川県能登", "scaleFrom": 60, "scaleTo": 60, "kindCode": "11" },
                    { "pref": "新潟県", "name": "新潟県上越", "scaleFrom": 40, "scaleTo": 40, "kindCode": "10" }
                ],
                "isTest": true
            },
            // 🚨 修正: 地震情報(震度速報)のテストデータを、より現実的な形式に修正
            'quake_3': {
                "code": 551, "issue": {"source": "試験用", "time": new Date().toISOString(), "type": "DetailScale"},
                "earthquake": {
                    "time": new Date().toISOString(), "hypocenter": {"name": "千葉県東方沖", "depth": 30},
                    "maxScale": 30, "magnitude": 5.0
                }, "isTest": true
            },
            'tsunami_advisory': {
                "code": 556,
                "areas": [
                    {"grade": "Watch", "immediate": false, "name": "岩手県"},
                    {"grade": "Watch", "immediate": false, "name": "宮城県"}
                ],
                "issue": {
                    "source": "試験用", "time": new Date().toISOString(), "type": "Tsunami", "serial": `TEST-TSUNAMI-${Date.now()}`,
                    "text": "岩手県、宮城県に津波注意報を発表しました。"
                },
                "isTest": true
            },
            'tsunami_major_warning': {
                "code": 556, "issue": {
                    "source": "試験用", "time": new Date().toISOString(), "type": "Tsunami", "serial": `TEST-TSUNAMI-${Date.now()}`,
                    "text": "沖縄県に大津波警報が発表されました。ただちに高台に避難してください。"
                },
                "areas": [
                    {"grade": "MajorWarning", "immediate": true, "name": "沖縄本島地方"},
                    {"grade": "MajorWarning", "immediate": true, "name": "宮古島・八重山地方"}
                ],
                "isTest": true
            }
        };

        testEew5WeakA.addEventListener('click', () => { processAlertData(TEST_DATA['eew_5weak_a']); });
        testEew6StrongA.addEventListener('click', () => { processAlertData(TEST_DATA['eew_6strong_a']); });
        testQuake3Button.addEventListener('click', () => { processAlertData(TEST_DATA['quake_3']); });
        testTsunamiAdvisory.addEventListener('click', () => { processAlertData(TEST_DATA['tsunami_advisory']); });
        testTsunamiMajorWarning.addEventListener('click', () => { processAlertData(TEST_DATA['tsunami_major_warning']); });
        
        testSoundButton.addEventListener('click', () => {
            // 現在の震度6強に設定されているアラーム設定を使ってテスト
            const maxInt = 60; 
            playAlarmForIntensity(maxInt);
            console.log(`テスト: 震度6強に設定されているアラーム (${CURRENT_SETTINGS.eewSoundMap.int6_up}) を再生します。`);
        });

        clearAlertButton.addEventListener('click', () => { hideAlert(); });

        // ----------------------------------------------------
        // 🚀 起動 🚀
        // ----------------------------------------------------
        window.onload = () => {
            setupApp(); // UIとAudioContextの初期化
            loadSettingsFromLocalStorage(); // LocalStorageから設定をロード (この中で音声ロードが呼ばれる)
            loadHistoryFromLocalStorage(); // LocalStorageから履歴をロード
            preloadAssets(); // 🚨 画像と音声アセットのプリロードを実行
            connectWebSocket(); // WebSocket接続を開始
            
            loadStatusEl.classList.remove('hidden');
        };
    </script>
